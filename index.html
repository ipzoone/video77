    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #101014;
        --surface: #1a1a20;
        --surface2: #24242c;
        --accent: #f5a623; /* amber — ganti sesuai selera */
        --text: #ececf0;
        --muted: #83838f;
        --card-w: 210px;

        /* warna per source — TAMBAH SUMBER BARU: tambahkan variabel baru di sini, mis. --bs: #00e5ff; */
        --yt: #ff4d4d;
        --dm: #4d9dff;
        --vm: #4dff4d;
        --ar: #8f7dff;
        --lk21: #e8e526;
        --klikxxi: #ff6b6b; /* contoh warna untuk source baru */
        --rebahin: #c8ff21;
        --starpathz: #16bb4d;
        /* contoh warna untuk source baru */
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
      }

      /* ── NAVBAR ── */
      nav {
        position: sticky;
        top: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        padding: 14px 4%;
        background: rgba(16, 16, 20, 0.92);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .logo {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
      }
      .logo span {
        color: var(--accent);
      }

      .source-filters {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 11px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        border: 1.5px solid transparent;
        transition: all 0.18s;
        user-select: none;
        opacity: 0.4;
        white-space: nowrap;
      }
      .pill.on {
        opacity: 1;
      }
      /* TAMBAH SUMBER BARU: tambahkan pasangan selector seperti di bawah untuk source baru
       .pill[data-src="bstation"] { border-color: var(--bs); color: var(--bs); }
       .pill[data-src="bstation"].on { background: var(--bs); color:#000; }           */
      .pill[data-src="youtube"] {
        border-color: var(--yt);
        color: var(--yt);
      }
      .pill[data-src="rebahin"] {
        border-color: var(--rebahin);
        color: var(--rebahin);
      }
      .pill[data-src="starpathz"] {
        border-color: var(--starpathz);
        color: var(--starpathz);
      }
      .pill[data-src="vimeo"] {
        border-color: var(--vm);
        color: var(--vm);
      }
      .pill[data-src="archive"] {
        border-color: var(--ar);
        color: var(--ar);
      }
      .pill[data-src="lk21"] {
        border-color: var(--lk21);
        color: var(--lk21);
      }
      .pill[data-src="klikxxi"] {
        border-color: var(--klikxxi);
        color: var(--klikxxi);
      }
      .pill[data-src="youtube"].on {
        background: var(--yt);
        color: #fff;
      }
      .pill[data-src="dailymotion"].on {
        background: var(--dm);
        color: #fff;
      }
      .pill[data-src="vimeo"].on {
        background: var(--vm);
        color: #000;
      }
      .pill[data-src="archive"].on {
        background: var(--ar);
        color: #fff;
      }
      .pill[data-src="lk21"].on {
        background: var(--lk21);
        color: #000;
      }
      .pill[data-src="klikxxi"].on {
        background: var(--klikxxi);
        color: #000;
      }

      .search-bar {
        margin-left: auto;
        display: flex;
        gap: 7px;
      }
      .search-bar input {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 7px;
        color: white;
        padding: 8px 14px;
        font-size: 13px;
        width: 240px;
        outline: none;
        transition: border-color 0.2s;
      }
      .search-bar input:focus {
        border-color: var(--accent);
      }
      .search-bar button {
        background: var(--accent);
        border: none;
        color: #101014;
        border-radius: 7px;
        padding: 8px 16px;
        cursor: pointer;
        font-weight: 700;
        font-size: 13px;
        transition: opacity 0.2s;
        white-space: nowrap;
      }
      .search-bar button:hover {
        opacity: 0.85;
      }

      /* ── HERO ── */
      .hero {
        width: 100%;
        background: #000;
      }
      .hero iframe {
        width: 100%;
        height: 56.25vw;
        max-height: 78vh;
        border: none;
        display: block;
      }
      .hero-placeholder,
      .hero-loading {
        width: 100%;
        height: min(56.25vw, 70vh);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #08080a;
        color: var(--muted);
      }
      .hero-placeholder .material-icons-round {
        font-size: 3.2rem;
      }
      .hero-loading-bar {
        width: 180px;
        height: 3px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .hero-loading-bar::after {
        content: "";
        display: block;
        height: 100%;
        width: 40%;
        border-radius: 4px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        animation: heroSlide 1.2s ease-in-out infinite;
      }
      @keyframes heroSlide {
        0% {
          transform: translateX(-200%);
        }
        100% {
          transform: translateX(500%);
        }
      }

      /* ── SHIMMER SKELETON ── */
      @keyframes shimmer {
        0% {
          background-position: -600px 0;
        }
        100% {
          background-position: 600px 0;
        }
      }
      .shimmer-base {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.05) 25%,
          rgba(255, 255, 255, 0.13) 50%,
          rgba(255, 255, 255, 0.05) 75%
        );
        background-size: 600px 100%;
        animation: shimmer 1.4s infinite linear;
        border-radius: 6px;
      }
      .skeleton-section {
        margin-top: 28px;
      }
      .skeleton-sec-title {
        height: 14px;
        width: 120px;
        margin-bottom: 11px;
      }
      .skeleton-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
        gap: 10px;
      }
      .skeleton-thumb {
        width: 100%;
        aspect-ratio: 16/9;
      }
      .skeleton-line {
        margin: 8px 8px 4px;
        height: 11px;
        width: 80%;
      }
      .skeleton-line.short {
        width: 50%;
        margin-bottom: 10px;
      }

      /* ── NOW PLAYING BAR ── */
      .now-bar {
        display: none;
        padding: 13px 4%;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .now-bar.show {
        display: flex;
      }
      .src-badge {
        font-size: 10px;
        font-weight: 800;
        padding: 3px 9px;
        border-radius: 4px;
        text-transform: uppercase;
        white-space: nowrap;
      }
      /* TAMBAH SUMBER BARU: .src-badge.bstation { background: var(--bs); color:#000; } */
      .src-badge.youtube {
        background: var(--yt);
        color: #fff;
      }
      .src-badge.dailymotion {
        background: var(--dm);
        color: #fff;
      }
      .src-badge.vimeo {
        background: var(--vm);
        color: #000;
      }
      .src-badge.archive {
        background: var(--ar);
        color: #fff;
      }
      .src-badge.rebahin {
        background: var(--rebahin);
        color: #fff;
      }
      .now-bar h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(13px, 2vw, 20px);
        font-weight: 700;
        flex: 1;
      }

      /* ── SECTIONS / CARDS ── */
      .sections {
        padding: 0 4% 40px;
      }
      .section {
        margin-top: 28px;
      }
      .sec-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 11px;
      }
      .sec-title {
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(13px, 1.5vw, 17px);
        font-weight: 700;
      }
      .sec-count {
        font-size: 11px;
        color: var(--muted);
      }
      .view-btns {
        margin-left: auto;
        display: flex;
        gap: 5px;
      }
      .btn-v {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: white;
        border-radius: 5px;
        padding: 3px 9px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.15s;
      }
      .btn-v:hover,
      .btn-v.on {
        background: var(--accent);
        color: #101014;
        border-color: var(--accent);
      }

      .carousel {
        display: flex;
        gap: 9px;
        overflow-x: auto;
        scroll-behavior: smooth;
        padding-bottom: 5px;
      }
      .carousel::-webkit-scrollbar {
        height: 3px;
      }
      .carousel::-webkit-scrollbar-thumb {
        background: var(--muted);
        border-radius: 3px;
      }
      .video-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
        gap: 11px;
      }

      .card {
        flex: 0 0 var(--card-w);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface);
        cursor: pointer;
        position: relative;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .card:hover {
        transform: scale(1.06);
        z-index: 10;
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.8);
      }
      .card.active {
        outline: 3px solid var(--accent);
        outline-offset: -3px;
      }
      .card::before {
        content: "▶";
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: #fff;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        transition: opacity 0.18s;
        pointer-events: none;
        z-index: 2;
      }
      .card:hover::before {
        opacity: 1;
      }
      .card-strip {
        height: 3px;
        width: 100%;
      }
      /* TAMBAH SUMBER BARU: .card-strip.bstation { background: var(--bs); } */
      .card-strip.youtube {
        background: var(--yt);
      }
      .card-strip.dailymotion {
        background: var(--dm);
      }
      .card-strip.vimeo {
        background: var(--vm);
      }
      .card-strip.archive {
        background: var(--ar);
      }
      .card-strip.lk21 {
        background: var(--lk21);
      }
      .card-strip.klikxxi {
        background: var(--klikxxi);
      }
      .card-strip.rebahin {
        background: var(--rebahin);
      }
      .card-thumb {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
        background: var(--surface2);
      }
      .card-info {
        padding: 8px 9px 10px;
      }
      .card-title {
        font-size: 12px;
        color: var(--text);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.4;
      }
      .card-meta {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 5px;
        flex-wrap: wrap;
      }
      .mini-badge {
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 3px;
        text-transform: uppercase;
        white-space: nowrap;
      }
      /* TAMBAH SUMBER BARU: .mini-badge.bstation { background: rgba(0,229,255,.15); color: var(--bs); } */
      .mini-badge.youtube {
        background: rgba(255, 77, 77, 0.15);
        color: var(--yt);
      }
      .mini-badge.dailymotion {
        background: rgba(77, 157, 255, 0.15);
        color: var(--dm);
      }
      .mini-badge.vimeo {
        background: rgba(77, 216, 255, 0.15);
        color: var(--vm);
      }
      .mini-badge.archive {
        background: rgba(143, 125, 255, 0.15);
        color: var(--ar);
      }
      .mini-badge.lk21 {
        background: rgba(232, 229, 38, 0.15);
        color: var(--lk21);
      }
      .mini-badge.klikxxi {
        background: rgba(255, 107, 107, 0.15);
        color: var(--klikxxi);
      }
      .mini-badge.rebahin {
        background: rgba(255, 107, 107, 0.15);
        color: var(--rebahin);
      }
      .mini-badge.starpathz {
        background: rgba(22, 187, 77, 0.15);
        color: var(--starpathz);
      }
      .card-dur,
      .card-genre {
        font-size: 10px;
        color: var(--muted);
      }
      .card-rating {
        font-size: 10px;
        color: #f5c518;
      }

      /* ── FILM MODAL (untuk source bertipe 'film') ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 500;
        background: rgba(0, 0, 0, 0.85);
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.show {
        display: flex;
      }
      .modal {
        background: var(--surface);
        border-radius: 10px;
        width: min(92vw, 960px);
        max-height: 90vh;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
      }
      .modal-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: var(--surface2);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .modal-head h2 {
        font-size: 15px;
        flex: 1;
      }
      .modal-close {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 1.4rem;
        cursor: pointer;
        line-height: 1;
        padding: 0 4px;
      }
      .modal-close:hover {
        color: white;
      }
      .modal-frame-wrap {
        flex: 1;
        position: relative;
        min-height: 0;
      }
      .modal-frame-wrap iframe {
        width: 100%;
        height: 100%;
        min-height: 320px;
        max-height: 68vh;
        border: none;
        display: block;
      }
      .modal-info {
        padding: 10px 16px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .modal-open-btn {
        margin-left: auto;
        background: var(--accent);
        color: #101014;
        border: none;
        border-radius: 6px;
        padding: 7px 16px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        display: inline-block;
      }
      .modal-open-btn:hover {
        opacity: 0.85;
      }

      /* ── TOAST ── */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: #1e1e24;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-left: 3px solid var(--accent);
        color: var(--text);
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 13px;
        opacity: 0;
        transform: translateY(12px) scale(0.97);
        transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 999;
        max-width: 320px;
        pointer-events: none;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.7);
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .toast .t-icon {
        font-size: 18px;
        flex-shrink: 0;
        color: var(--accent);
      }
      .toast .t-title {
        font-weight: 700;
        font-size: 12px;
      }
      .toast .t-sub {
        font-size: 11px;
        color: var(--muted);
      }

      footer {
        text-align: center;
        padding: 26px;
        color: var(--muted);
        font-size: 11px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        margin-top: 10px;
      }
    </style>

    <script src="https://pl30205137.effectivecpmnetwork.com/a0/c3/c2/a0c3c2cf27532d5e3639dd0d1fe5cfc2.js"></script>
    <script src="https://pl30205137.effectivecpmnetwork.com/a0/c3/c2/a0c3c2cf27532d5e3639dd0d1fe5cfc2.js"></script>
    <script src="https://pl30205137.effectivecpmnetwork.com/a0/c3/c2/a0c3c2cf27532d5e3639dd0d1fe5cfc2.js"></script>
    <div class="toast" id="toast"></div>

    <script>
      // ─── CONFIG ───────────────────────────────────────────
      // TAMBAH SUMBER BARU: tambahkan entry baru di sini, key harus SAMA PERSIS
      // dengan key yang kamu daftarkan di SCRAPERS (app.py), contoh:
      // bstation: { label: 'Bstation', icon: 'live_tv', type: 'video' },
      const SRC_META = {
        youtube: { label: "YouTube", icon: "play_arrow", type: "video" },
        dailymotion: { label: "Dailymotion", icon: "videocam", type: "video" },
        vimeo: { label: "Vimeo", icon: "theaters", type: "video" },
        archive: { label: "Archive.org", icon: "archive", type: "video" },
        lk21: { label: "Lk21", icon: "movie", type: "video" },
        klikxxi: { label: "Klikxxi", icon: "movie", type: "video" },
        rebahin: { label: "Rebahin", icon: "movie", type: "video" },
        starpathz: { label: "Starpathz", icon: "movie", type: "video" },
      };

      // ─── STATE ────────────────────────────────────────────
      let allVideos = [];
      let activeVideo = null;
      let viewMode = "carousel";
      let activeSrcs = new Set(Object.keys(SRC_META));

      function toggleSrc(pill) {
        const src = pill.dataset.src;
        if (activeSrcs.has(src)) {
          if (activeSrcs.size === 1) return;
          activeSrcs.delete(src);
          pill.classList.remove("on");
        } else {
          activeSrcs.add(src);
          pill.classList.add("on");
        }
        renderSections();
      }

      // ─── SEARCH ───────────────────────────────────────────
      async function doSearch() {
        const q = document.getElementById("qInput").value.trim() || "video";

        document.getElementById("hero").innerHTML = `
      <div class="hero-loading">
        <span class="material-icons-round" style="font-size:2.6rem;color:var(--accent);opacity:.7">movie_filter</span>
        <div style="font-size:13px;color:var(--muted)">Memuat video…</div>
        <div class="hero-loading-bar"></div>
      </div>`;
        setSections(shimmerHTML());

        try {
          const srcs = [...activeSrcs].join(",");
          const res = await fetch(
            `/api/videos?q=${encodeURIComponent(q)}&sources=${srcs}`,
          );
          if (!res.ok) throw new Error("server");
          allVideos = await res.json();
          const srcCount = [...new Set(allVideos.map((v) => v.source))].length;
          showToast(
            "check_circle",
            `${allVideos.length} video ditemukan`,
            `dari ${srcCount} sumber`,
          );
        } catch (_) {
          // fallback: baca videos.json hasil pencarian terakhir yang tersimpan di server
          try {
            const r2 = await fetch("videos.json");
            if (!r2.ok) throw new Error();
            const d = await r2.json();
            allVideos = d.videos ?? d;
            showToast("folder_open", "Mode offline", "Memuat dari videos.json");
          } catch (_2) {
            allVideos = [];
            showToast("error", "Gagal memuat", "Server tidak merespons");
          }
        }

        renderSections();
        document.getElementById("hero").innerHTML = `
      <div class="hero-placeholder">
        <span class="material-icons-round">movie</span>
        <p>Pilih video untuk mulai menonton</p>
      </div>`;
      }

      // ─── RENDER SECTIONS ─────────────────────────────────
      function renderSections() {
        const wrap = document.getElementById("sections");
        wrap.innerHTML = "";

        // TAMBAH SUMBER BARU: tambahkan key ke array `order` di bawah,
        // supaya section-nya ikut muncul (urutan array = urutan tampil)
        const order = Object.keys(SRC_META);
        order.forEach((src) => {
          if (!activeSrcs.has(src)) return;
          const items = allVideos.filter((v) => v.source === src);
          if (!items.length) return;

          const sec = document.createElement("div");
          sec.className = "section";
          const meta = SRC_META[src];
          sec.innerHTML = `
        <div class="sec-header">
          <span class="material-icons-round" style="font-size:18px;color:var(--muted)">${meta.icon}</span>
          <span class="sec-title">${meta.label}</span>
          <span class="sec-count">${items.length} hasil</span>
          <div class="view-btns">
            <button class="btn-v ${viewMode === "carousel" ? "on" : ""}" onclick="setView('carousel')"><span class="material-icons-round" style="font-size:13px;vertical-align:middle">view_carousel</span></button>
            <button class="btn-v ${viewMode === "grid" ? "on" : ""}" onclick="setView('grid')"><span class="material-icons-round" style="font-size:13px;vertical-align:middle">grid_view</span></button>
          </div>
        </div>`;

          const list = document.createElement("div");
          list.className = viewMode === "grid" ? "video-grid" : "carousel";
          items.forEach((v) => list.appendChild(buildCard(v)));
          sec.appendChild(list);
          wrap.appendChild(sec);
        });

        if (!wrap.children.length) {
          wrap.innerHTML =
            '<p style="padding:30px;color:var(--muted);font-size:14px">Tidak ada hasil dari sumber yang dipilih.</p>';
        }
      }

      function buildCard(v) {
        const card = document.createElement("div");
        const isActive =
          activeVideo &&
          activeVideo.id === v.id &&
          activeVideo.source === v.source;
        card.className = "card" + (isActive ? " active" : "");
        card.dataset.id = v.id;
        card.dataset.src = v.source;
        card.onclick = () => handlePlay(v);

        const thumb = v.thumbnail || fallbackThumb(v);
        const meta = SRC_META[v.source] || {};
        const ratingHtml = v.rating
          ? `<span class="card-rating">★ ${esc(v.rating)}</span>`
          : "";
        const genreHtml = v.genre
          ? `<span class="card-genre">${esc(v.genre)}</span>`
          : "";
        const durHtml = v.duration
          ? `<span class="card-dur">${esc(v.duration)}</span>`
          : "";
        const yearHtml = v.year
          ? `<span class="card-dur">${esc(v.year)}</span>`
          : "";

        card.innerHTML = `
      <div class="card-strip ${v.source}"></div>
      <img class="card-thumb" src="${esc(thumb)}" alt="${esc(v.title)}" loading="lazy"
           onerror="this.src='${esc(fallbackThumb(v))}'"/>
      <div class="card-info">
        <div class="card-title">${esc(v.title)}</div>
        <div class="card-meta">
          <span class="mini-badge ${v.source}">${v.source}</span>
          ${ratingHtml}${durHtml}${yearHtml}${genreHtml}
        </div>
      </div>`;
        return card;
      }

      function fallbackThumb(v) {
        if (v.source === "youtube")
          return `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;
        if (v.source === "vimeo") return `https://vumbnail.com/${v.id}.jpg`;
        return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180"><rect width="320" height="180" fill="%231a1a20"/><text x="50%25" y="50%25" fill="%23666" text-anchor="middle" dy=".3em" font-size="14">No Image</text></svg>';
      }

      function setView(mode) {
        viewMode = mode;
        renderSections();
      }

      // ─── HANDLE PLAY ───────────────────────────────────────
      // type 'video' → autoplay inline di hero player
      // type 'film'  → dibuka di modal iframe (untuk source seperti Bstation
      //                yang mungkin tidak punya embed player langsung)
      function handlePlay(v) {
        activeVideo = v;
        highlightCards();
        const meta = SRC_META[v.source] || {};
        const itemType = v.type || meta.type || "video";
        if (itemType === "film") {
          openModal(v);
        } else {
          playInHero(v);
        }
      }

      function playInHero(v) {
        const embed = v.embed_url || "";
        document.getElementById("hero").innerHTML = `
      <iframe src="${esc(embed)}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
        const bar = document.getElementById("nowBar");
        const badge = document.getElementById("nowBadge");
        bar.classList.add("show");
        badge.textContent = SRC_META[v.source]?.label || v.source;
        badge.className = `src-badge ${v.source}`;
        document.getElementById("nowTitle").textContent = v.title;
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function openModal(v) {
        const overlay = document.getElementById("modalOverlay");
        document.getElementById("modalTitle").textContent = v.title;
        document.getElementById("modalBadge").textContent =
          SRC_META[v.source]?.label || v.source;
        document.getElementById("modalBadge").className =
          `src-badge ${v.source}`;
        document.getElementById("modalBadge2").textContent =
          SRC_META[v.source]?.label || v.source;
        document.getElementById("modalBadge2").className =
          `src-badge ${v.source}`;
        const parts = [];
        if (v.year) parts.push(v.year);
        if (v.rating) parts.push(`★ ${v.rating}`);
        if (v.genre) parts.push(v.genre);
        document.getElementById("modalMeta").textContent = parts.join(" · ");
        document.getElementById("modalOpenBtn").href =
          v.page_url || v.embed_url || "#";
        document.getElementById("modalFrame").src =
          v.embed_url || v.page_url || "about:blank";
        overlay.classList.add("show");
        document.body.style.overflow = "hidden";
      }

      function closeModal(e) {
        if (e && e.target !== document.getElementById("modalOverlay")) return;
        document.getElementById("modalOverlay").classList.remove("show");
        document.getElementById("modalFrame").src = "about:blank";
        document.body.style.overflow = "";
      }

      function highlightCards() {
        document.querySelectorAll(".card").forEach((c) => {
          c.classList.toggle(
            "active",
            c.dataset.id === activeVideo?.id &&
              c.dataset.src === activeVideo?.source,
          );
        });
      }

      // ─── HELPERS ─────────────────────────────────────────
      function esc(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function setSections(html) {
        document.getElementById("sections").innerHTML = html;
      }
      function shimmerHTML() {
        const card = `<div><div class="skeleton-thumb shimmer-base"></div><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div>`;
        const section = `<div class="skeleton-section"><div class="skeleton-sec-title shimmer-base"></div><div class="skeleton-grid">${card.repeat(6)}</div></div>`;
        return section.repeat(3);
      }
      function showToast(icon, title, sub, ms = 4000) {
        const t = document.getElementById("toast");
        t.innerHTML = `<span class="material-icons-round t-icon">${icon}</span><div><div class="t-title">${title}</div>${sub ? `<div class="t-sub">${sub}</div>` : ""}</div>`;
        t.classList.add("show");
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove("show"), ms);
      }

      document.getElementById("qInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doSearch();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          document.getElementById("modalOverlay").classList.remove("show");
          document.getElementById("modalFrame").src = "about:blank";
          document.body.style.overflow = "";
        }
      });

      function showWelcome() {
        document.getElementById("sections").innerHTML = `
      <div style="padding:60px 0;text-align:center;color:var(--muted)">
        <span class="material-icons-round" style="font-size:3.2rem;display:block;margin-bottom:16px">movie</span>
        <div style="font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:8px">Selamat datang di VideoHub</div>
        <div style="font-size:0.9rem">Ketik judul video di kolom pencarian, lalu tekan <strong style="color:var(--accent)">Cari</strong></div>
      </div>`;
      }

      // ─── AUTOLOAD DARI videos.json SAAT HALAMAN DIBUKA ───────
      // Kalau file videos.json sudah ada isinya (hasil scraping sebelumnya di server),
      // langsung tampilkan datanya begitu halaman dibuka, tanpa perlu klik "Cari" dulu.
      async function autoLoadFromJson() {
        setSections(shimmerHTML());
        try {
          const res = await fetch("videos.json", { cache: "no-store" });
          if (!res.ok) throw new Error("no file");
          const data = await res.json();
          // dukung dua format: array langsung, atau { query, videos: [...] }
          const list = Array.isArray(data) ? data : (data.videos ?? []);
          if (list.length) {
            allVideos = list;
            if (!Array.isArray(data) && data.query) {
              document.getElementById("qInput").value = data.query;
            }
            renderSections();
            const srcCount = [...new Set(allVideos.map((v) => v.source))]
              .length;
            showToast(
              "folder_open",
              `${allVideos.length} video dimuat`,
              `dari videos.json (${srcCount} sumber)`,
            );
            return;
          }
        } catch (_) {
          // videos.json belum ada / kosong / gagal dibaca — tampilkan welcome screen saja
        }
        showWelcome();
      }

      autoLoadFromJson();
    </script>
  </body>
</html>
